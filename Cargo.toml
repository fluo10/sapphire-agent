[package]
name = "sapphire-agent"
version = "0.1.0"
edition = "2024"
description = "My personal AI assistant — Matrix + Anthropic only"

[[bin]]
name = "sapphire-agent"
path = "src/main.rs"

[dependencies]
# Async runtime
tokio = { version = "1.50", default-features = false, features = [
    "rt-multi-thread",
    "macros",
    "time",
    "sync",
    "fs",
    "signal",
] }

# HTTP client (Anthropic API)
reqwest = { version = "0.12", default-features = false, features = [
    "json",
    "rustls-tls",
    "stream",
] }

# Matrix client + E2EE
matrix-sdk = { version = "0.16", default-features = false, features = [
    "e2e-encryption",
    "rustls-tls",
    "sqlite",
    "markdown",
] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Config (TOML)
toml = "1.0"

# Error handling
anyhow = "1.0"

# Async traits
async-trait = "0.1"

# Futures utilities (SSE streaming)
futures-util = "0.3"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", default-features = false, features = [
    "fmt",
    "ansi",
    "env-filter",
] }

# CLI
clap = { version = "4.5", features = ["derive"] }

# XDG directories for config/data paths
directories = "6.0"

# Shell path expansion (~/)
shellexpand = "3.1"
