[package]
name = "sapphire-agent"
version = "0.1.0"
edition = "2024"
description = "My personal AI assistant — Matrix + Anthropic only"

[[bin]]
name = "sapphire-agent"
path = "src/main.rs"

[features]
default = ["lancedb-store"]
lancedb-store = ["sapphire-workspace/lancedb-store"]

[dependencies]
# Async runtime
tokio = { version = "1.50", default-features = false, features = [
    "rt-multi-thread",
    "macros",
    "time",
    "sync",
    "fs",
    "signal",
] }

# HTTP client (Anthropic API + tool HTTP calls)
reqwest = { version = "0.12", default-features = false, features = [
    "json",
    "rustls-tls",
    "stream",
    "blocking",
] }

# Matrix client + E2EE
matrix-sdk = { version = "0.16", default-features = false, features = [
    "e2e-encryption",
    "rustls-tls",
    "sqlite",
    "markdown",
] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Config (TOML)
toml = "1.0"

# Error handling
anyhow = "1.0"

# Async traits
async-trait = "0.1"

# Futures utilities (SSE streaming)
futures-util = "0.3"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", default-features = false, features = [
    "fmt",
    "ansi",
    "env-filter",
] }

# CLI
clap = { version = "4.5", features = ["derive"] }

# XDG directories for config/data paths
directories = "6.0"

# Shell path expansion (~/)
shellexpand = "3.1"

# Date/time with serde support (human-readable ISO 8601 timestamps)
chrono = { version = "0.4", features = ["serde"] }

# Time-ordered unique IDs for session files
uuid = { version = "1", features = ["v7"] }

# Workspace: file indexing, FTS, vector search, git sync
# lancedb-store is gated behind the "lancedb-store" feature (default on)
sapphire-workspace = { version = "0.5.0", default-features = false, features = ["git-sync"] }

# Discord bot (gateway + HTTP, rustls TLS)
# Requires MESSAGE_CONTENT privileged intent enabled in Discord Developer Portal
serenity = { version = "0.12", default-features = false, features = [
    "client",
    "gateway",
    "model",
    "rustls_backend",
] }
