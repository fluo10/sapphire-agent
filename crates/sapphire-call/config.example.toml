# Example sapphire-call configuration.
#
# Place at `~/.config/sapphire-call/config.toml` (XDG) for the
# satellite to pick up automatically, or pass `--config <path>`.
#
# Wake-word configuration intentionally lives server-side under the
# room_profile — see `[room_profile.<n>].wake_word` on the agent.
# Every satellite for that room_profile fetches the same phrase via
# `voice/config` at startup.

[server]
url          = "https://agent.example.com"
room_profile = "home_voice"
# session    = "abc1234"   # 7-char grain id to resume an existing session

[audio]
# Discover names via `sapphire-call voice --list-devices`. Either or
# both may be omitted to fall back to the host's defaults.
# input_device  = "Jabra SPEAK 510 USB"
# output_device = "Jabra SPEAK 510 USB"

[language]
# Sent as an STT hint with each utterance. Server's voice_pipeline
# default applies when omitted.
# stt = "ja"

[device]
# Identity sent to the agent on every session. The agent renders the
# system prompt's "# Current Room" block as "voice channel with <name>"
# using the description as the topic — so the model knows where it's
# speaking without that fact being baked into AGENTS.md. Both fields
# are optional; the block is only emitted when `name` is set.
# name        = "living-room-speaker"
# description = "Speakerphone in the living room; STT may produce typos due to ambient noise"

[behavior]
# Confirmation beeps and follow-up listening window. Defaults shown.
# beep_on_wake          = true   # rising tone right after the wake word fires
# beep_on_capture_end   = true   # falling tone when the VAD ships an utterance to STT
# follow_up_listen_seconds = 5   # keep the mic open this long after the AI finishes
#                                  speaking, so the user can reply without re-waking.
#                                  Set to 0 to require a wake word for every turn.
