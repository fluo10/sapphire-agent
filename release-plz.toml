[workspace]
# Per-package tags / GitHub releases. Existing single-version tags like
# `v0.6.1` stay as historical anchors; new tags use the per-package form.
git_tag_name = "{{ package }}-v{{ version }}"
git_release_name = "{{ package }}-v{{ version }}"

# Static PR title. release-plz's `pr_name` context doesn't expose a per-package
# list (the `releases` variable is only available in `pr_body`), so dynamic
# titles for multi-package bumps aren't possible. The PR body lists the bumps,
# and per-package tags / GH releases use `{{ package }}-v{{ version }}` above.
pr_name = "chore(release): version bump"

[[package]]
name = "sapphire-agent"
changelog_path = "./CHANGELOG.md"

[[package]]
name = "sapphire-agent-rpc"
changelog_path = "./crates/sapphire-agent-rpc/CHANGELOG.md"

[[package]]
name = "sapphire-call-core"
changelog_path = "./crates/sapphire-call-core/CHANGELOG.md"

[[package]]
name = "sapphire-call-cli"
changelog_path = "./crates/sapphire-call-cli/CHANGELOG.md"

# sapphire-call-desktop ships as a GitHub-release-only binary (bevy +
# bundled font + ICE-licensed Lucide SVGs — not intended for crates.io,
# hence `publish = false` in its Cargo.toml). release-plz still creates
# the `sapphire-call-desktop-v*` tag + GH release; the
# `.github/workflows/release-desktop.yml` workflow builds the binaries
# for that tag and attaches them as release assets.
[[package]]
name = "sapphire-call-desktop"
changelog_path = "./crates/sapphire-call-desktop/CHANGELOG.md"
publish = false
