name: Release binaries

# Triggered by the per-package tag release-plz pushes for sapphire-agent.
# release-plz creates the GitHub release; this workflow uploads the
# cross-platform sapphire-agent binaries as assets onto that release.
on:
  push:
    tags:
      - 'sapphire-agent-v*'

jobs:
  build:
    continue-on-error: ${{ matrix.continue-on-error }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary: sapphire-agent
            asset_name: sapphire-agent-linux-x86_64
            continue-on-error: false
          - os: ubuntu-24.04-arm
            binary: sapphire-agent
            asset_name: sapphire-agent-linux-aarch64
            continue-on-error: false
          - os: macos-latest
            binary: sapphire-agent
            asset_name: sapphire-agent-macos-aarch64
            continue-on-error: true
          - os: windows-latest
            binary: sapphire-agent.exe
            asset_name: sapphire-agent-windows-x86_64.exe
            continue-on-error: true
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --package sapphire-agent

      - name: Rename binary
        shell: bash
        run: cp target/release/${{ matrix.binary }} ${{ matrix.asset_name }}

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.asset_name }}
