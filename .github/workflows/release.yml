name: Release binaries

# Builds the cross-platform sapphire-agent binaries and uploads them as
# release assets onto an existing GitHub release.
#
# Triggered as a reusable workflow from release-plz.yml (so the run
# happens immediately after release-plz creates the tag + release),
# plus a `workflow_dispatch` trigger for retroactive runs against a
# tag whose binaries weren't uploaded on first release.
#
# A `push: tags` trigger is intentionally omitted: release-plz pushes
# tags using GITHUB_TOKEN, and GitHub Actions does not fire workflows
# on tags pushed by GITHUB_TOKEN. Using workflow_call from release-plz
# sidesteps that limitation without needing a PAT.
on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
        description: 'Existing release tag to attach binaries to (e.g. sapphire-agent-v0.7.1).'
  workflow_dispatch:
    inputs:
      tag:
        required: true
        type: string
        description: 'Existing release tag to attach binaries to (e.g. sapphire-agent-v0.7.1).'

jobs:
  build:
    continue-on-error: ${{ matrix.continue-on-error }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary: sapphire-agent
            asset_name: sapphire-agent-linux-x86_64
            continue-on-error: false
          - os: ubuntu-24.04-arm
            binary: sapphire-agent
            asset_name: sapphire-agent-linux-aarch64
            continue-on-error: false
          - os: macos-latest
            binary: sapphire-agent
            asset_name: sapphire-agent-macos-aarch64
            continue-on-error: true
          - os: windows-latest
            binary: sapphire-agent.exe
            asset_name: sapphire-agent-windows-x86_64.exe
            continue-on-error: true
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --package sapphire-agent

      - name: Rename binary
        shell: bash
        run: cp target/release/${{ matrix.binary }} ${{ matrix.asset_name }}

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          files: ${{ matrix.asset_name }}
