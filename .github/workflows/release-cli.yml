name: Release CLI binaries

# Builds the cross-platform sapphire-call (CLI satellite) binaries and
# uploads them as release assets onto an existing GitHub release.
#
# Same trigger model as release.yml — invoked by release-plz.yml via
# workflow_call right after it creates the tag, plus workflow_dispatch
# for retroactive uploads. `push: tags` is omitted because
# release-plz's GITHUB_TOKEN tag pushes don't fire downstream
# workflows.
on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
        description: 'Existing release tag to attach binaries to (e.g. sapphire-call-cli-v0.7.0).'
  workflow_dispatch:
    inputs:
      tag:
        required: true
        type: string
        description: 'Existing release tag to attach binaries to (e.g. sapphire-call-cli-v0.7.0).'

jobs:
  build:
    continue-on-error: ${{ matrix.continue-on-error }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary: sapphire-call
            asset_name: sapphire-call-linux-x86_64
            continue-on-error: false
          - os: ubuntu-24.04-arm
            binary: sapphire-call
            asset_name: sapphire-call-linux-aarch64
            continue-on-error: false
          - os: macos-latest
            binary: sapphire-call
            asset_name: sapphire-call-macos-aarch64
            continue-on-error: true
          - os: windows-latest
            binary: sapphire-call.exe
            asset_name: sapphire-call-windows-x86_64.exe
            continue-on-error: true
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # cpal needs ALSA headers on Linux for the mic/speaker capture
      # path; bevy-style display libs aren't pulled in (the CLI is
      # headless).
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --package sapphire-call-cli

      - name: Rename binary
        shell: bash
        run: cp target/release/${{ matrix.binary }} ${{ matrix.asset_name }}

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          files: ${{ matrix.asset_name }}
