# Voice pipeline real test config — SenseVoice STT + Irodori-TTS.
#
# What you need:
#   * `cargo build --release --features voice-sherpa --bin sapphire-agent`
#     (first build is slow — sherpa-onnx + ONNX runtime via CMake)
#   * Irodori-TTS running locally on http://localhost:7860
#       git clone https://github.com/Aratako/Irodori-TTS
#       cd Irodori-TTS && pip install -r requirements.txt
#       python app.py  # or wherever the gradio entrypoint lives
#   * ANTHROPIC_API_KEY
#
# What happens on first run:
#   * SenseVoice model bundle (~230 MB) auto-downloads to
#     ~/.local/share/sapphire-agent/voice-models/ (server side)
#   * Silero VAD model (~2 MB) auto-downloads to
#     ~/.local/share/sapphire-call/voice-models/ (client side)
#
# Run:
#   ANTHROPIC_API_KEY=sk-... cargo run --release --features voice-sherpa \
#       --bin sapphire-agent -- --config test-configs/voice-irodori.toml serve
#
# Then point the satellite at it (separate terminal):
#   cargo run --release --bin sapphire-call -- voice \
#       --room-profile voice_irodori --language ja

[anthropic]
# api_key omitted → resolved from the `ANTHROPIC_API_KEY` env var at
# server startup. Set it inline only if you really want the key on
# disk (don't — this file lives in the repo).
# api_key = "sk-ant-..."
model = "claude-haiku-4-5-20251001"

# Disable the workspace git auto-sync. This config sits inside the
# sapphire-agent repo, so `workspace_dir` resolves to a directory
# that's already in git — without this knob, sapphire-sync would
# commit every state file the agent emits on top of the repo's own
# history.
[sync]
backend = "none"

# --- Voice pipeline ---------------------------------------------------

[voice_pipeline.irodori]
stt_provider = "sense_voice"
tts_provider = "irodori"
language     = "ja"
capture_max_ms = 30000

[stt_provider.sense_voice]
type  = "sherpa_onnx"
kind  = "sense_voice"
# Auto-downloaded from sherpa-onnx GitHub releases on first run.
model = "sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2024-07-17"

[tts_provider.irodori]
type        = "gradio"
base_url    = "https://irodori.home.fireturtle.net"
# Internal callback name on this Irodori-TTS deployment (queried from
# `${base_url}/gradio_api/info`). The HF Space exposes a public
# `/generate` alias; self-hosted instances without `api_name=...` show
# the underlying `_run_generation`.
fn_name     = "_run_generation"
# 24-arg payload schema matching Irodori-TTS gradio_app.py:452 `inputs=`.
# Note: position 6 is `enable_watermark` (a gr.State(False) — *not*
# listed in /gradio_api/info because Gradio's API doc generator hides
# State components, but the click handler still expects a value).
# The first five values are deployment-side runtime settings — fill
# them in to match what your browser sends (DevTools → Network →
# POST /gradio_api/call/_run_generation → request body's `data` array).
payload = '''
{"data": [
  "Aratako/Irodori-TTS-500M-v2",
  "cuda",
  "fp32",
  "cuda",
  "fp32",
  false,
  "{{text}}",
  null,
  40,
  1,
  "",
  "independent",
  3.0,
  5.0,
  "",
  0.5,
  1.0,
  true,
  "",
  "",
  "",
  "",
  "0.9",
  ""
]}
'''
# RFC 6901 JSON Pointer — Gradio gr.Audio returns {"url": ..., "path": ...}
# and our resolver auto-unwraps `url`. data[0] is the first of 32
# Audio outputs; data[32]/[33] are Run Log and Timing strings.
audio_field = "/data/0"

# --- Profile + room_profile wiring -----------------------------------

[profiles.casual]
provider = "anthropic"

[room_profile.voice_irodori]
profile        = "casual"
voice_pipeline = "irodori"
rooms          = []
