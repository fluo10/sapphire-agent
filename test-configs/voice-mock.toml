# Voice pipeline smoke-test config — mock STT + mock TTS.
#
# Use this for verifying that the voice/pipeline_run MCP method, SSE
# wire format, and sapphire-call <-> sapphire-agent plumbing work
# without downloading any models or starting external services.
#
# What you still need:
#   * ANTHROPIC_API_KEY (the LLM still runs for real)
#
# What this skips:
#   * sherpa-onnx model downloads (200 MB+)
#   * Irodori-TTS / Gradio setup
#   * The `voice-sherpa` cargo feature — default build is fine
#
# Run:
#   ANTHROPIC_API_KEY=sk-... cargo run --bin sapphire-agent -- \
#       --config test-configs/voice-mock.toml serve
#
# Then point the satellite at it:
#   cargo run --bin sapphire-call -- voice --room-profile voice_test
#
# Speak any utterance — you'll hear a 200 ms 440 Hz beep back. The
# real assistant text appears in the satellite's stderr above the beep.

[anthropic]
# api_key omitted → resolved from the `ANTHROPIC_API_KEY` env var at
# server startup. Set it inline only if you really want the key on
# disk (don't — this file lives in the repo).
# api_key = "sk-ant-..."
# Light model keeps smoke-test cost negligible.
model = "claude-haiku-4-5-20251001"

# Disable the workspace git auto-sync. The smoke-test config sits
# inside the sapphire-agent repo, so `workspace_dir` resolves to a
# directory that's already in git — without this knob, sapphire-sync
# would commit every state file the agent emits (devices.jsonl,
# sessions/, memory/, …) on top of the repo's own history.
[sync]
backend = "none"

# --- Voice pipeline ---------------------------------------------------

[voice_pipeline.mock]
stt_provider = "mock_stt"
tts_provider = "mock_tts"
# Server-side hard cap (also matches the satellite cap).
capture_max_ms = 30000

[stt_provider.mock_stt]
type       = "mock"
# Whatever the user says is replaced by this constant. Pick something
# benign that the LLM can respond to so playback isn't empty.
transcript = "Say hi briefly."

[tts_provider.mock_tts]
type         = "mock"
duration_ms  = 400
frequency_hz = 440

# --- Profile + room_profile wiring -----------------------------------

[profiles.casual]
provider = "anthropic"

[room_profile.voice_test]
profile        = "casual"
voice_pipeline = "mock"
# rooms = [] because this profile is reached via MCP only.
rooms          = []
