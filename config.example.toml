[matrix]
homeserver = "https://matrix.example.com"
access_token = "syt_..."
user_id = "@bot:example.com"
device_id = "DEVICEID"
# Rooms to listen in. Accepts either an array (preferred) or a single string
# via the legacy `room_id` key.
room_ids = ["!roomid:example.com"]
# Messages from users not in this list are silently ignored.
# Leave empty ([]) to allow all users.
allowed_users = ["@you:example.com"]
# E2EE recovery key — obtain from Element → Settings → Security → Secure Backup
recovery_key = "EsT... "
# Where to store matrix-sdk state / crypto DB (default: ~/.local/share/sapphire-agent/matrix)
# state_dir = "~/.local/share/sapphire-agent/matrix"

# Disable heartbeat (day-boundary + cron) tasks. Useful for test
# environments that share the same workspace to avoid duplicate tasks.
# heartbeat_enabled = false

# Cold-standby mode: only perform git sync — no channel listening,
# no heartbeat, no HTTP server. The process stays alive for periodic
# sync and shuts down on Ctrl-C. Manual switchover to active mode
# by flipping this flag and restarting.
# standby_mode = true

# Directory containing AGENT.md and MEMORY.md.
# Defaults to the same directory as this config file.
# workspace_dir = "~/.config/sapphire-agent"

# Day-boundary session policy. One of:
#   "reset"   — close the session; next message starts a new one (legacy default)
#   "compact" — keep the session; force-summarize prior-day history into a stub
#   "none"    — no day-boundary action
# session_policy = "compact"

# Per-room overrides. Keys are room_ids; values may set session_policy.
# [rooms."!roomid:example.com"]
# session_policy = "reset"

# Periodic log digests. The agent summarises weekly/monthly/yearly activity
# into short importance-ordered bullet lists, stored as YAML frontmatter in
# memory/{weekly,monthly,yearly}/. The top-N items per kind are injected
# into the system prompt so the agent retains long-horizon context.
# [digest]
# daily_items     = 3   # top-N per daily (injected as "This Week's Digests")
# weekly_items    = 3   # top-N per weekly (injected as "This Month's Digests")
# monthly_items   = 5   # top-N per monthly (injected as "This Year's Digests")
# yearly_items    = 5   # top-N per yearly (injected as "Past Years' Digests")
# weekly_enabled  = true
# monthly_enabled = true
# yearly_enabled  = true

[anthropic]
api_key = "sk-ant-..."
# Model to use. Defaults to claude-opus-4-6.
model = "claude-opus-4-6"
# Maximum tokens in the response. Defaults to 8192.
max_tokens = 8192
# System prompt sent at the beginning of every conversation.
system_prompt = "You are a helpful personal assistant."
